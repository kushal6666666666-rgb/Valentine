

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Be My Valentine 💖</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Poppins", system-ui, sans-serif;
      background: linear-gradient(145deg, #fff0f5, #ffe4e1);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 16px;
    }

    .card {
      background: white;
      padding: 28px 22px 32px;
      border-radius: 24px;
      text-align: center;
      box-shadow: 0 20px 45px rgba(255, 77, 109, 0.25);
      width: 100%;
      max-width: 360px;
      position: relative;
    }

    h1 {
      color: #ff4d6d;
      font-size: 24px;
      margin-bottom: 8px;
    }

    p {
      color: #555;
      font-size: 15px;
      margin-bottom: 22px;
    }

    .buttons {
      position: relative;
      height: 140px;
    }

    button {
      padding: 14px 28px;
      font-size: 16px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      position: absolute;
      transition: transform 0.25s ease, background 0.25s ease;
    }

    #yes {
      background: #ff4d6d;
      color: white;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 10px 20px rgba(255,77,109,0.35);
    }

    #yes:active {
      transform: translateX(-50%) scale(0.95);
    }

    #no {
      background: #f3f3f3;
      color: #333;
      left: 50%;
      top: 70px;
      transform: translateX(-50%);
    }

    .message {
      min-height: 20px;
      margin-top: 10px;
      font-size: 14px;
      color: #ff4d6d;
    }

    .celebrate {
      display: none;
    }

    .celebrate h2 {
      color: #ff4d6d;
      font-size: 22px;
      margin-bottom: 8px;
    }

    .celebrate img {
      width: 150px;
      margin-top: 12px;
    }

    /* Floating hearts */
    .heart {
      position: fixed;
      bottom: -20px;
      font-size: 18px;
      animation: floatUp linear forwards;
      opacity: 0.8;
      pointer-events: none;
    }

    @keyframes floatUp {
      from {
        transform: translateY(0) scale(1);
        opacity: 0.9;
      }
      to {
        transform: translateY(-120vh) scale(1.5);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

<script>
  const HER_NAME = "My Love";
  const YOUR_NAME = "your love";
</script>

<div class="card">
  <h1 id="title"></h1>
  <p id="question"></p>

  <div class="buttons" id="buttons">
    <button id="yes">Yes 💖</button>
    <button id="no">No 🙈</button>
  </div>

  <div class="message" id="message"></div>

  <div class="celebrate" id="celebrate">
    <h2>HURRAYYYYY 🎉</h2>
    <p>
      Achievement unlocked:<br>
      <b>Best Valentine Ever 💘</b>
    </p>
    <p style="font-size:14px;">— love, <b id="nameSlot"></b></p>
    <img src="https://media.giphy.com/media/l4FGpP4lxGGgK5CBW/giphy.gif" alt="dance">
  </div>
</div>

<script>
  const noBtn = document.getElementById("no");
  const yesBtn = document.getElementById("yes");
  const message = document.getElementById("message");
  const buttons = document.getElementById("buttons");
  const celebrate = document.getElementById("celebrate");

  const noMessages = [
    "Error 404: No not found 😶",
    "Are you sure? 🥺",
    "This action is irreversible 💔",
    "Think again, human 🤖",
    "Low battery… need love 🔋❤️",
    "Tujse naa ho payega lala 😏"
    
  ];

  let noCount = 0;

  function moveNoButton() {
    const maxX = 120;
    const maxY = 90;
    const x = Math.random() * maxX * 2 - maxX;
    const y = Math.random() * maxY;
    noBtn.style.transform = `translate(${x}px, ${y}px)`;

    message.textContent = noMessages[noCount % noMessages.length];
    noCount++;
  }

  // Touch + click friendly
  noBtn.addEventListener("click", moveNoButton);
  noBtn.addEventListener("touchstart", moveNoButton);

  yesBtn.addEventListener("click", () => {
    buttons.style.display = "none";
    message.style.display = "none";
    celebrate.style.display = "block";
    document.getElementById("nameSlot").textContent = YOUR_NAME;
  });

  // Floating hearts
  setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.textContent = "💗";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 16 + 12 + "px";
    heart.style.animationDuration = Math.random() * 2 + 4 + "s";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
  }, 600);

  document.getElementById("title").textContent = `Hey ${HER_NAME} 💕`;
  document.getElementById("question").textContent =
    `Will you be my Valentine?`;
</script>

</body>
</html>
